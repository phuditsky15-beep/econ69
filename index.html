<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Econ 69 | Senior-Junior Mentor Match</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            /* 🌸 ปรับการไล่เฉดสีแบบพาสเทลให้เนียนตาและสมูทยิ่งขึ้น */
            background: radial-gradient(circle at 10% 20%, #fff7fa 0%, #fbcde2 45%, #e1f4e7 90%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }
        
        /* ✨ ไอคอนฉากหลังปรับให้ขยับนุ่มนวลพริ้วไหวขึ้น */
        .bg-gimmick {
            position: absolute;
            font-size: 28px;
            opacity: 0.12;
            animation: floatGimmick 8s ease-in-out infinite;
            user-select: none;
            z-index: 1;
        }
        @keyframes floatGimmick {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            50% { transform: translateY(-20px) scale(1.08) rotate(7deg); }
        }

        .container {
            background-color: rgba(255, 255, 255, 0.94);
            padding: 50px 32px 42px 32px;
            border-radius: 32px;
            /* ปรับมิติเงาฟุ้งสไตล์น่ารักผสมผสานความคลีน */
            box-shadow: 0 20px 50px rgba(224, 71, 122, 0.12), 0 5px 20px rgba(40, 167, 69, 0.06);
            text-align: center;
            max-width: 480px;
            width: 100%;
            border: 4px solid rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(16px);
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 25px;
            background-color: #ffffff;
            border: 2px solid #fbc4db;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            color: #bd1550;
            transition: all 0.25s ease;
            box-shadow: 0 4px 8px rgba(224, 71, 122, 0.08);
            z-index: 20;
        }
        .lang-switch:hover {
            background-color: #bd1550;
            color: #ffffff;
            border-color: #bd1550;
            transform: scale(1.05);
        }
        
        .badge-69 {
            background: linear-gradient(45deg, #ff4081, #28a745);
            color: white;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 12.5px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 18px;
            box-shadow: 0 5px 12px rgba(255, 64, 129, 0.2);
            letter-spacing: 0.5px;
        }

        h2 {
            color: #bd1550;
            margin: 5px 0;
            font-size: 26px;
            font-weight: 800;
        }
        .subtitle {
            color: #555;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .note-highlight {
            color: #e23b74;
            font-weight: bold;
            font-size: 13px;
            margin-top: 6px;
            display: block;
        }
        .input-group {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 16px;
            border: 2.5px solid #fbc4db;
            border-radius: 22px;
            font-size: 18px;
            text-align: center;
            transition: all 0.3s ease;
            background-color: #fffbfd;
            letter-spacing: 1.5px;
            font-weight: bold;
            color: #444;
        }
        input[type="text"]:focus {
            border-color: #28a745;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.15);
            outline: none;
            background-color: #ffffff;
        }
        
        button.btn-submit {
            background: linear-gradient(135deg, #ff65a3 0%, #ff4081 100%);
            color: white;
            border: none;
            padding: 16px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 22px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 16px rgba(255, 64, 129, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button.btn-submit:hover {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            transform: translateY(-3px);
            box-shadow: 0 10px 22px rgba(40, 167, 69, 0.35);
        }
        button.btn-submit:active {
            transform: translateY(-1px);
        }

        .result-box {
            margin-top: 25px;
            padding: 24px;
            border-radius: 22px;
            display: none;
            font-weight: bold;
            line-height: 1.6;
            animation: fadeIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .success {
            background-color: #edfcf0;
            color: #1b5e20;
            border: 2.5px solid #a5d6a7;
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.05);
        }
        .error {
            background-color: #fff5f6;
            color: #c62828;
            border: 2.5px solid #ffcdd2;
            box-shadow: 0 8px 20px rgba(198, 40, 40, 0.05);
        }
        
        .hint-label {
            font-size: 14px;
            color: #444;
            margin-bottom: 2px;
            display: block;
            font-weight: 600;
        }
        .hint-text {
            font-size: 23px;
            color: #1b5e20;
            font-weight: bold;
            display: block;
            text-shadow: 0 1px 1px rgba(0,0,0,0.02);
        }
        .hint-divider {
            margin: 14px 0;
            border: 0;
            border-top: 1px dashed #b2dfdb;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.93) translateY(12px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

<div class="bg-gimmick" style="top: 15%; left: 8%; animation-delay: 0s;">📊</div>
<div class="bg-gimmick" style="top: 25%; right: 10%; animation-delay: 2s;">📈</div>
<div class="bg-gimmick" style="bottom: 22%; left: 12%; animation-delay: 4s;">📉</div>
<div class="bg-gimmick" style="bottom: 14%; right: 9%; animation-delay: 6s;">✨</div>

<div class="container">
    <button class="lang-switch" onclick="toggleLanguage()" id="langBtn">EN</button>

    <div class="badge-69">ECON 69 • MENTOR MATCHING</div>
    <h2 id="title">ระบบค้นหาคำใบ้สายรหัส</h2>
    <div class="subtitle" id="subtitle">
        ยินดีต้อนรับน้องๆ ECON 69 เข้าสู่ระบบค้นหาคำใบ้สายรหัส<br>กรอกรหัสนักศึกษา 9 หลัก เพื่อดูคำใบ้จากพี่รหัสได้เลย✨
        <span class="note-highlight">*หมายเหตุ: หากน้องได้รับคำใบ้มากกว่า 1 คำใบ้ หมายความว่าน้องมีพี่รหัสตามจำนวนคำใบ้นั้นๆน้า 🐷</span>
    </div>
    
    <div class="input-group">
        <input type="text" id="studentId" placeholder="กรอกรหัสนักศึกษา 9 หลัก" maxlength="9" inputmode="numeric">
    </div>
    <button class="btn-submit" onclick="getHint()">
        <span id="btnText">ดูคำใบ้พี่รหัส</span>
    </button>
    
    <div id="result" class="result-box"></div>
</div>

<script>
    let currentLang = 'th';

    const translations = {
        th: {
            title: "ระบบค้นหาคำใบ้สายรหัส",
            subtitle: "ยินดีต้อนรับนักศึกษา ECON 69 เข้าสู่ระบบค้นหาคำใบ้สายรหัส<br>กรอกรหัสนักศึกษา 9 หลัก เพื่อดูคำใบ้จากพี่รหัสได้เลย✨<span class='note-highlight'>*หมายเหตุ: หากน้องได้รับคำใบ้มากกว่า 1 คำใบ้ หมายความว่าน้องมีพี่รหัสตามจำนวนคำใบ้นั้นๆน้า 🐷</span>",
            placeholder: "กรอกรหัสนักศึกษา 9 หลัก",
            btnText: "ดูคำใบ้พี่รหัส",
            langBtn: "EN",
            emptyError: "กรุณากรอกรหัสนักศึกษาของคุณก่อนกดดูคำใบ้",
            notFoundError: "ไม่พบข้อมูลคำใบ้ของรหัสนี้ในระบบ กรุณาตรวจสอบรหัสนักศึกษาใหม่อีกครั้ง",
            foundSuccess: "พบข้อมูลคำใบ้สายรหัสของคุณแล้ว",
            hintSingle: "คำใบ้จากพี่รหัสของคุณ:",
            hintMultiplePrefix: "คำใบ้จากพี่รหัสคนที่ ",
            consentError: "นักศึกษาไม่ยินยอมให้ใช้ข้อมูลในการจัดสายรหัส ทำให้ไม่สามารถนำข้อมูลของน้องมาจัดสายรหัสได้"
        },
        en: {
            title: "Mentor Hint Search System",
            subtitle: "Welcome ECON 69 students to the Mentor Matching System.<br>Enter your 9-digit student ID to see your mentor's hint.<span class='note-highlight'>*Note: If you receive more than 1 hint, it means you have multiple mentors matching that exact number of hints.</span>",
            placeholder: "Enter your 9-digit student ID",
            btnText: "View Hint",
            langBtn: "TH",
            emptyError: "Please enter your student ID before checking the hint.",
            notFoundError: "Student ID not found. Please double-check your numbers.",
            foundSuccess: "Your mentor's hint has been found",
            hintSingle: "Your mentor's hint:",
            hintMultiplePrefix: "Hint from mentor ",
            consentError: "The student did not consent to the use of their data for mentor matching, so their information could not be processed."
        }
    };

    // 💡 คลังข้อมูลคำใบ้สายรหัส (รหัสน้อง : คำใบ้พี่)
    const hintData = {
        "691610007": "Test",
        "691610387": "Grey",
        "691610001": ["ชอบคุโรมิ", "ใส่แว่นตัวเล็กๆ"], 
        "691610002": "ตัวเลข",
        "691610003": ["สูงกว่า 175", "ชอบเล่นบาส", "ใจดีมาก"],
        "691610344": ["เตเต้เป็นเกย์", "ชอบคนเก่า"],
        "691610345": ["ชอบเล่นเกย์", "คิดถึงข้าวฟ่าง"],
        "691610340": ["ไม่บอก."]
    };

    function toggleLanguage() {
        currentLang = currentLang === 'th' ? 'en' : 'th';
        updateDOMTexts();
        if (document.getElementById("result").style.display === "block") {
            getHint(); 
        }
    }

    function updateDOMTexts() {
        const lang = translations[currentLang];
        document.getElementById("title").innerText = lang.title;
        document.getElementById("subtitle").innerHTML = lang.subtitle;
        document.getElementById("studentId").placeholder = lang.placeholder;
        document.getElementById("btnText").innerText = lang.btnText;
        document.getElementById("langBtn").innerText = lang.langBtn;
    }

    function getHint() {
        const idInput = document.getElementById("studentId").value.trim();
        const resultBox = document.getElementById("result");
        const lang = translations[currentLang];
        
        resultBox.style.display = "none";
        resultBox.className = "result-box";

        if (idInput === "") {
            resultBox.innerText = lang.emptyError;
            resultBox.classList.add("error");
            resultBox.style.display = "block";
            return;
        }

        // 🚨 ดักรหัสของน้องที่ไม่ยินยอมให้ใช้ข้อมูลก่อนตรวจฐานข้อมูล
        if (idInput === "6916100035" || idInput === "691610035") {
            resultBox.innerText = lang.consentError;
            resultBox.classList.add("error");
            resultBox.style.display = "block";
            return;
        }

        const data = hintData[idInput];

        if (data) {
            let htmlContent = `<span style="color: #555; font-size:14px; display:block; margin-bottom:15px;">✨ ${lang.foundSuccess}</span>`;
            
            if (Array.isArray(data)) {
                data.forEach((hint, index) => {
                    let label = `${lang.hintMultiplePrefix}${index + 1}:`;

                    htmlContent += `
                        <span class="hint-label">${label}</span>
                        <span class="hint-text">"${hint}"</span>
                    `;
                    if (index < data.length - 1) {
                        htmlContent += `<hr class="hint-divider">`;
                    }
                });
            } else {
                htmlContent += `
                    <span class="hint-label">${lang.hintSingle}</span>
                    <span class="hint-text">"${data}"</span>
                `;
            }
            
            resultBox.innerHTML = htmlContent;
            resultBox.classList.add("success");
        } else {
            resultBox.innerText = lang.notFoundError;
            resultBox.classList.add("error");
        }
        
        resultBox.style.display = "block";
    }

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const idParam = urlParams.get('id');
        
        if (idParam) {
            document.getElementById("studentId").value = idParam;
            getHint();
        }
    }
</script>

</body>
</html>
